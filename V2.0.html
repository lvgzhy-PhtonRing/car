      let car = null;
      if (txnId) {
        txn = account.transactions.find(t => t.id === txnId);
        if (txn && txn.carSid) car = carAppData.cars.find(c => c.sid === txn.carSid);
      }

      // 当前账户对应的默认小车类别
      const defaultCarCat = accountId === 'invest' ? 'invest' : 'keep';
      const carCatLabel = defaultCarCat === 'invest' ? '投资' : '自留';
      const newSid = genUUID();
      const isCarBuy = presetCategory === 'car_buy' || (txn && txn.category === 'car_buy');
      const isCarSell = presetCategory === 'car_sell' || (txn && txn.category === 'car_sell');
      const isPresetType = presetType === 'expense' || presetType === 'income';
      const hideToggle = isCarBuy || isCarSell || isPresetType;
      const modalTitle = isCarBuy ? '买小车' : isCarSell ? '卖小车' : (txn ? '编辑交易' : '新增记录');

      const html = `
        <div id="txnModal" class="fixed inset-0 modal-backdrop flex items-center justify-center p-4 z-50">
          <div class="glass-strong rounded-2xl-apple w-full max-w-md p-6 max-h-[90vh] overflow-y-auto">
            <h3 class="font-bold text-lg mb-4">${modalTitle}</h3>
            <input type="hidden" id="txnAccountId" value="${accountId}">
            <input type="hidden" id="txnId" value="${txn ? txn.id : ''}">
            <input type="hidden" id="carSid" value="${car ? car.sid : newSid}">
            <input type="hidden" id="carCategory" value="${car ? car.category : defaultCarCat}">
            <div class="space-y-3">
              ${hideToggle ? '' : `
              <div class="flex gap-2">
                <button onclick="setTxnType('expense')" id="btnExpense" class="flex-1 py-2 rounded-xl text-sm font-bold ${(!txn || txn.type === 'expense') ? 'bg-invest/10 text-invest' : 'glass-light text-gray-500'}">支出</button>
                <button onclick="setTxnType('income')" id="btnIncome" class="flex-1 py-2 rounded-xl text-sm font-bold ${txn && txn.type === 'income' ? 'bg-keep/10 text-keep' : 'glass-light text-gray-500'}">收入</button>
              </div>
              `}
              <input type="hidden" id="txnType" value="${txn ? txn.type : (presetType || 'expense')}">
              ${isCarBuy || isCarSell ? '' : `
              <div>
                <label class="block text-sm text-gray-600 mb-1">类别</label>
                <select id="txnCategory" onchange="onTxnCategoryChange()" class="w-full glass-input p-2.5 text-sm">
                </select>
              </div>
              `}
              ${isCarBuy || isCarSell ? `<input type="hidden" id="txnCategory" value="${isCarBuy ? 'car_buy' : 'car_sell'}">` : ''}
              ${(isCarBuy && !txn) || isCarSell ? `
              <input type="hidden" id="txnAmount" value="${txn ? txn.amount : ''}">
              <input type="hidden" id="txnDate" value="${txn ? txn.date : getToday()}">
              ` : `
              <div>
                <label class="block text-sm text-gray-600 mb-1">金额</label>
                <input type="number" id="txnAmount" oninput="onTxnAmountChange()" value="${txn ? txn.amount : ''}" step="0.01" class="w-full glass-input p-2.5 text-sm">
              </div>
              <div>
                <label class="block text-sm text-gray-600 mb-1">日期</label>
                <input type="date" id="txnDate" onchange="onTxnDateChange()" value="${txn ? txn.date : getToday()}" class="w-full glass-input p-2.5 text-sm">
              </div>
              `}
              ${isCarBuy && !txn ? `
              <!-- === 新建买小车：完整小车属性 === -->
              <div id="carFields" class="space-y-3 border-t border-dashed border-gray-200 pt-4 mt-2">
                <div class="flex items-center gap-2 text-sm font-semibold text-accent">
                  <i data-lucide="car" class="w-4 h-4"></i> 小车属性
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-sm text-gray-600 mb-1">品牌</label>
                    ${renderBrandSelect('carBrand', '', 'onCarBrandChange()')}
                  </div>
                  <div>
                    <label class="block text-sm text-gray-600 mb-1">分类</label>
                    <select id="carSubCategory" onchange="onCarBrandChange()" class="w-full glass-input p-2 text-sm">
                      ${HW_SUBCATS.map(s => `<option value="${s}">${s || '-- 无 --'}</option>`).join('')}
                    </select>
                  </div>
                </div>
                <div class="mt-3">
                  <label class="block text-sm text-gray-600 mb-1">颜色/车型 <span class="text-invest">*</span></label>
                  <input type="text" id="carName" list="carNameList" placeholder="如：红奔驰AMG瓦罐" oninput="onCarNameChange('carName')" onchange="onCarNameChange('carName')" class="w-full glass-input p-2 text-sm">
                  <datalist id="carNameList"></datalist>
                </div>
                <div class="grid grid-cols-2 gap-3 mt-3">
                  <div>
                    <label class="block text-sm text-gray-600 mb-1">购买日期</label>
                    <input type="date" id="carBuyDate" value="${getToday()}" class="w-full glass-input p-2 text-sm">
                  </div>
                  <div>
                    <label class="block text-sm text-gray-600 mb-1">购买价格</label>
                    <input type="number" id="carBuyPrice" step="0.01" class="w-full glass-input p-2 text-sm">
                  </div>
                </div>
                <div class="mt-3">
                  <label class="block text-sm text-gray-600 mb-1">预期价值</label>
                  <input type="number" id="carExpected" step="0.01" placeholder="手动估值" oninput="onExpectedChange('carBrand', 'carName', 'carExpected')" class="w-full glass-input p-2 text-sm">
                  <div id="expectedSyncHint" class="text-xs text-orange-500 hidden mt-1">
                    <i data-lucide="info" class="w-3 h-3 inline-block align-middle mr-1"></i> 将联动更新 <span id="affectedCount">0</span> 辆同款车的预期价格
                  </div>
                </div>
                <div class="mt-3 flex items-center gap-4 text-xs">
                  <span class="text-gray-500">类别: <strong class="${defaultCarCat === 'invest' ? 'text-invest' : 'text-keep'}">${carCatLabel}</strong></span>
                  <span class="text-gray-400 font-mono">SID: 自动生成</span>
                </div>
                <div class="mt-3">
                  <label class="block text-sm text-gray-600 mb-1">小车备注</label>
                  <input type="text" id="carNote" class="w-full glass-input p-2 text-sm">
                </div>
              </div>
              ` : ''}
              ${(isCarBuy && txn) || isCarSell ? `
              <!-- === 编辑买卖交易：只选择小车 === -->
              <div id="carSelectSection" class="border-t border-dashed border-gray-200 pt-4 mt-2">
                <div class="flex items-center gap-2 text-sm font-semibold text-accent mb-3">
                  <i data-lucide="car" class="w-4 h-4"></i> 选择小车
                </div>
                <div>
                  <label class="block text-sm text-gray-600 mb-1">小车</label>
                  <select id="carSelect" class="w-full glass-input p-2 text-sm">
                    <option value="">选择小车</option>
                    ${carAppData.cars
                      .filter(c => (isCarSell && txn ? c.isSold : !c.isSold) && c.category === (accountId === 'invest' ? 'invest' : 'keep'))
                      .map(c => `<option value="${c.sid}" ${txn && txn.carSid === c.sid ? 'selected' : ''}>${esc(c.brand)} ${esc(c.name)} - ${fmt(c.buyPrice)}</option>`)
                      .join('')}
                  </select>
                </div>
                ${isCarSell ? `
                <div class="mt-3">
                  <label class="block text-sm text-gray-600 mb-1">卖出价格</label>
                  <input type="number" id="sellCarPriceInput" step="0.01" value="${txn ? txn.amount : ''}" class="w-full glass-input p-2 text-sm">
                </div>
                <div class="mt-3">
                  <label class="block text-sm text-gray-600 mb-1">卖出日期</label>
                  <input type="date" id="sellCarDateInput" value="${txn ? txn.date : getToday()}" class="w-full glass-input p-2 text-sm">
                </div>
                ` : ''}
                <div class="mt-3 text-xs text-gray-400">
                  💡 小车属性（品牌、名称、价格等）请在车库中修改
                </div>
              </div>
              ` : ''}
              ${isCarBuy || isCarSell ? '' : `
              <div class="mt-3">
                <label class="block text-sm text-gray-600 mb-1">备注</label>
                <input type="text" id="txnNote" value="${esc(txn ? txn.note : '')}" class="w-full glass-input p-2.5 text-sm">
              </div>
              `}
            </div>
            <div class="mt-6 flex justify-end space-x-2">
              <button onclick="hideModal()" class="px-4 py-2 glass-light rounded-xl-apple hover:bg-white/60 text-sm btn-glass">取消</button>
              <button onclick="saveTransaction()" class="px-4 py-2 bg-accent/85 text-white rounded-xl-apple hover:bg-accent/90 text-sm btn-glass">保存</button>
            </div>
          </div>
        </div>`;
      showModal(html);

      // 初始化
      if (isCarBuy || isCarSell) {
        // 买卖小车：使用统一的选择小车下拉框，无需额外初始化
      } else {
        // 普通交易：填充类别下拉，默认取列表第一个
        let initType = 'expense';
        let initCat = accountId === 'pocket' ? 'daily' : 'other';
        if (presetType === 'income') { initType = 'income'; initCat = accountId === 'pocket' ? 'allowance' : 'other'; }
        else if (presetType === 'expense') { initType = 'expense'; initCat = accountId === 'pocket' ? 'daily' : 'other'; }
        else if (txn) { initType = txn.type; initCat = txn.category; }
        populateCategoryDropdown(initType, accountId, initCat);
      }
    }

    function setTxnType(type) {
      document.getElementById('txnType').value = type;
      document.getElementById('btnExpense').className = type === 'expense'
        ? 'flex-1 py-2 rounded-xl text-sm font-bold bg-invest/10 text-invest'
        : 'flex-1 py-2 rounded-xl text-sm font-bold glass-light text-gray-500';
      document.getElementById('btnIncome').className = type === 'income'
        ? 'flex-1 py-2 rounded-xl text-sm font-bold bg-keep/10 text-keep'
        : 'flex-1 py-2 rounded-xl text-sm font-bold glass-light text-gray-500';
      const accountId = document.getElementById('txnAccountId').value;
      populateCategoryDropdown(type, accountId, document.getElementById('txnCategory').value);
    }

    function onTxnCategoryChange() {
      const catEl = document.getElementById('txnCategory');
      if (!catEl) return;
      const cat = catEl.value;
      const carSelectSection = document.getElementById('carSelectSection');

      if (cat === 'car_buy' || cat === 'car_sell') {
        if (carSelectSection) carSelectSection.style.display = "block";
      } else {
        if (carSelectSection) carSelectSection.style.display = "none";
      }
    }

    function onTxnAmountChange() {
      const cat = document.getElementById('txnCategory').value;
      const carBuyPrice = document.getElementById('carBuyPrice');
      if (cat === 'car_buy' && carBuyPrice) {
        const amt = document.getElementById('txnAmount').value;
        carBuyPrice.value = amt;
      }
    }

    function onTxnDateChange() {
      const cat = document.getElementById('txnCategory').value;
      const carBuyDate = document.getElementById('carBuyDate');
      if (cat === 'car_buy' && carBuyDate) {
        const date = document.getElementById('txnDate').value;
        carBuyDate.value = date;
      }
    }

    // 按收支类型过滤类别下拉
    function getCategoriesByType(type, accountId) {
      if (accountId === 'pocket') {
        // 日常消费：买小车走专用入口，支出不含买车
        if (type === 'expense') return [
          { value: 'daily', label: '日常消费' },
          { value: 'other', label: '其它' }
        ];
        return [
          { value: 'allowance', label: '存入零花钱' },
          { value: 'other', label: '其它' }
        ];
      }
      // 投资：买车走「新车」按钮，卖车从车库，此处只留通用
      if (type === 'expense') return [
        { value: 'other', label: '其它' }
      ];
      return [
        { value: 'other', label: '其它' }
      ];
    }

    function populateCategoryDropdown(type, accountId, selectedValue) {
      const sel = document.getElementById('txnCategory');
      const cats = getCategoriesByType(type, accountId);
      sel.innerHTML = cats.map(c =>
        `<option value="${c.value}" ${c.value === selectedValue ? 'selected' : ''}>${c.label}</option>`
      ).join('');
    }

    function onTxnCategoryChange() {
      // placeholder for future category-specific logic
    }

    function saveTransaction() {
      const accountId = document.getElementById('txnAccountId').value;
      const txnId = document.getElementById('txnId').value;
      const type = document.getElementById('txnType').value;
      const category = document.getElementById('txnCategory').value;
      let amount = parseFloat(document.getElementById('txnAmount').value) || 0;
      let date = document.getElementById('txnDate').value;
      const noteEl = document.getElementById('txnNote');
      let note = noteEl ? noteEl.value.trim() : '';
      // 买车/卖车时备注输入框不存在，编辑已有记录时保留原备注
      if (!noteEl && txnId) {
        const oldTxn = carAppData.accounts[accountId].transactions.find(t => t.id === txnId);
        if (oldTxn) note = oldTxn.note || '';
      }

      // 卖车交易：从卖出价格和卖出日期获取值
      if (category === 'car_sell') {
        const sellPriceInput = document.getElementById('sellCarPriceInput');
        const sellDateInput = document.getElementById('sellCarDateInput');
        if (sellPriceInput) amount = parseFloat(sellPriceInput.value) || 0;
        if (sellDateInput) date = sellDateInput.value || date;
      }

      if (!amount) return alert('请输入金额');

      // === 处理小车关联 ===
      let carSid = null;

      if (category === 'car_buy') {
        if (txnId) {
          // 编辑已有买入记录：从下拉框选择小车，同步更新小车价格
          const carSelect = document.getElementById('carSelect');
          const selectedSid = carSelect ? carSelect.value : '';
          if (!selectedSid) return alert('请选择小车');
          
          const car = carAppData.cars.find(c => c.sid === selectedSid);
          if (!car) return alert('未找到选中的小车');
          
          // 同步更新小车的购买价格和购买日期
          car.buyPrice = amount;
          car.buyDate = date;
          
          carSid = selectedSid;
          note = (car.brand ? car.brand + ' ' : '') + car.name;
        } else {
          // 新建买入记录：创建新小车
          const carNameEl = document.getElementById('carName');
          const carName = carNameEl ? carNameEl.value.trim() : '';
          if (!carName) return alert('请填写颜色/车型');
          const sid = document.getElementById('carSid').value;
          const brand = document.getElementById('carBrand').value.trim();
          const buyDate = document.getElementById('carBuyDate').value || date;
          const buyPrice = parseFloat(document.getElementById('carBuyPrice').value) || amount;
          const expectedValue = parseFloat(document.getElementById('carExpected').value) || 0;
          const carCat = document.getElementById('carCategory').value;
          const carNote = document.getElementById('carNote').value.trim();
          const subCategory = document.getElementById('carSubCategory')?.value || '';

          // 用购买价格/日期作为交易金额/日期
          amount = buyPrice;
          date = buyDate;

          const newCar = {
            sid, brand, name: carName,
            buyDate, buyPrice, subCategory,
            category: carCat,
            sellPrice: null, soldDate: null,
            isSold: false, note: carNote,
            expectedHistory: [{ date: buyDate, value: expectedValue }],
            expectedValue
          };
          carAppData.cars.push(newCar);
          carSid = sid;
          note = carName;
        }
      }

      else if (category === 'car_sell') {
        const carSelect = document.getElementById('carSelect');
        const selectedSid = carSelect ? carSelect.value : '';
        if (!selectedSid) return alert('请选择要卖出的小车');
        
        // 编辑卖车交易时，如果更改了选中的小车，需要恢复原来小车的状态
        if (txnId) {
          const oldTxn = carAppData.accounts[accountId].transactions.find(t => t.id === txnId);
          if (oldTxn && oldTxn.carSid && oldTxn.carSid !== selectedSid) {
            const oldCar = carAppData.cars.find(c => c.sid === oldTxn.carSid);
            if (oldCar) {
              oldCar.isSold = false;
              oldCar.sellPrice = null;
              oldCar.soldDate = null;
            }
          }
        }
        
        const car = carAppData.cars.find(c => c.sid === selectedSid);
        if (car) {
          car.isSold = true;
          car.sellPrice = amount;
          car.soldDate = date;
        }
        carSid = selectedSid;
        note = '卖出: ' + (car.brand ? car.brand + ' ' : '') + car.name;
      }

      // === 创建/更新交易记录 ===
      // 保留原有的 loanId（如果存在）
      let loanId = null;
      if (txnId) {
        const oldTxn = carAppData.accounts[accountId].transactions.find(t => t.id === txnId);
        if (oldTxn) loanId = oldTxn.loanId;
      }

      const txn = {
        id: txnId || genId('txn'),
        type, category, amount, date,
        carSid, loanId, transferPairId: null, note
      };

      const account = carAppData.accounts[accountId];
      if (txnId) {
        account.transactions = account.transactions.map(t => t.id === txnId ? txn : t);
      } else {
        account.transactions.push(txn);
      }

      // 贷款联动：编辑贷款类型的收支记录时，同步更新贷款
      if (loanId && (category === 'loan_new' || category === 'loan_repay')) {
        const invest = carAppData.accounts.invest;
        const loan = invest.loans.find(l => l.id === loanId);
        if (loan) {
          if (category === 'loan_new') {
            const oldAmount = loan.amount;
            loan.amount = amount;
            loan.remaining = Math.max(0, (loan.remaining || 0) + (amount - oldAmount));
            // 更新其他关联的贷款收支记录（如还款记录）
          } else if (category === 'loan_repay') {
            // 还款记录变化时，更新贷款剩余金额
            const oldRepayTxn = carAppData.accounts[accountId].transactions.find(t => t.id === txnId);
            const oldRepayAmount = oldRepayTxn ? (parseFloat(oldRepayTxn.amount) || 0) : 0;
            loan.remaining = Math.max(0, (loan.remaining || 0) + oldRepayAmount - amount);
          }
        }
      }

      hideModal();
      saveData();

      // 联动提示 & 操作日志
      if (category === 'car_buy') {
        if (carSid) {
          const updatedCar = carAppData.cars.find(c => c.sid === carSid);
          if (updatedCar) {
            addOperationLog('car_buy', `买小车 ${esc(updatedCar.brand)} ${esc(updatedCar.name)} ${fmt(amount)}`, { name: updatedCar.name, brand: updatedCar.brand, amount, account: accountId });
            if (txnId) {
              alert(`✅ 已更新买入记录: ${updatedCar.brand} ${updatedCar.name}`);
            } else {
              alert(`✅ 已创建小车并记录买入: ${updatedCar.brand} ${updatedCar.name}`);
            }
          }
        }
      } else if (category === 'car_sell' && carSid) {
        const soldCar = carAppData.cars.find(c => c.sid === carSid);
        if (soldCar) {
          addOperationLog('car_sell', `卖出 ${esc(soldCar.brand || '')} ${esc(soldCar.name)} 售价 ${fmt(amount)}`, { name: soldCar.name, brand: soldCar.brand, sellPrice: amount, account: accountId });
        }
        alert('✅ 小车已标记为售出，卖车收入已计入收支');
      } else if (category !== 'car_buy' && category !== 'car_sell') {
        const logType = txnId ? 'txn_edit' : 'txn_add';
        addOperationLog(logType, `${type === 'income' ? '收入' : '支出'} ${category} ${fmt(amount)}`, { type, category, amount, account: accountId });
      }
    }

    function editTransaction(accountId, txnId) {
      openTransactionModal(accountId, txnId);
    }

    function deleteTransaction(accountId, txnId) {
      const account = carAppData.accounts[accountId];
      const txn = account.transactions.find(t => t.id === txnId);
      if (!txn) return;

      // 检查是否关联小车
      const linkedCar = txn.carSid ? carAppData.cars.find(c => c.sid === txn.carSid) : null;
      
      // 删除卖车交易：恢复小车状态为"未卖出"
      if (txn.category === 'car_sell' && linkedCar) {
        let msg = `确定删除此卖出记录？\n\n  ${txn.date}  卖出 ${esc(linkedCar.brand)} ${esc(linkedCar.name)}  ${fmt(txn.amount)}`;
        msg += `\n\n✅ 将恢复小车状态为"未卖出"`;
        if (!confirm(msg)) return;
        
        // 恢复小车状态
        linkedCar.isSold = false;
        linkedCar.sellPrice = null;
        linkedCar.soldDate = null;
        
        // 删除该交易记录
        account.transactions = account.transactions.filter(t => t.id !== txnId);
        addOperationLog('txn_delete', `删除卖出记录 ${esc(linkedCar.brand)} ${esc(linkedCar.name)}（已恢复未卖出）`, { name: linkedCar.name, brand: linkedCar.brand });
      }
      // 删除买车交易：删除小车及所有关联交易
      else if (txn.category === 'car_buy' && linkedCar) {
        let msg = `确定删除此买入记录？\n\n  ${txn.date}  买入 ${esc(linkedCar.brand)} ${esc(linkedCar.name)}  ${fmt(txn.amount)}`;
        msg += `\n\n⚠ 该小车及其其它关联收支也将被删除。`;
        if (!confirm(msg)) return;
        
        ['pocket', 'invest'].forEach(accId => {
          carAppData.accounts[accId].transactions =
            carAppData.accounts[accId].transactions.filter(t => t.carSid !== linkedCar.sid);
        });
        carAppData.cars = carAppData.cars.filter(c => c.sid !== linkedCar.sid);
        addOperationLog('car_delete', `删除小车 ${esc(linkedCar.brand)} ${esc(linkedCar.name)}（含关联收支）`, { name: linkedCar.name, brand: linkedCar.brand });
      }
      // 删除其他关联交易
      else if (linkedCar) {
        let msg = `确定删除此交易记录？\n\n  ${txn.date}  ${txn.category}  ${fmt(txn.amount)}`;
        msg += `\n\n⚠ 此记录关联小车: ${esc(linkedCar.brand)} ${esc(linkedCar.name)}`;
        msg += `\n   该小车及其其它关联收支也将被删除。`;
        if (!confirm(msg)) return;
        
        ['pocket', 'invest'].forEach(accId => {
          carAppData.accounts[accId].transactions =
            carAppData.accounts[accId].transactions.filter(t => t.carSid !== linkedCar.sid);
        });
        carAppData.cars = carAppData.cars.filter(c => c.sid !== linkedCar.sid);
        addOperationLog('car_delete', `删除小车 ${esc(linkedCar.brand)} ${esc(linkedCar.name)}（含关联收支）`, { name: linkedCar.name, brand: linkedCar.brand });
      }
      // 删除普通交易
      else {
        let msg = `确定删除此交易记录？\n\n  ${txn.date}  ${txn.category}  ${fmt(txn.amount)}`;
        if (!confirm(msg)) return;
        account.transactions = account.transactions.filter(t => t.id !== txnId);
        addOperationLog('txn_delete', `删除${txn.type === 'income' ? '收入' : '支出'} ${txn.category} ${fmt(txn.amount)}`, { type: txn.type, category: txn.category, amount: txn.amount });
      }

      saveData();

    function deleteCar(sid) {
      const car = carAppData.cars.find(c => c.sid === sid);
      if (!car) return;

      // 查找关联的收支记录
      const allTxns = [
        ...carAppData.accounts.pocket.transactions,
        ...carAppData.accounts.invest.transactions
      ];
      const linkedTxns = allTxns.filter(t => t.carSid === sid);
      const txnDetails = linkedTxns.map(t =>
        `  · ${t.date}  ${t.type === 'income' ? '收入' : '支出'} ${t.category}  ${fmt(t.amount)}  [${t.id.slice(0, 8)}]`
      ).join('\n');

      const msg = `确定删除 "${esc(car.brand)} ${esc(car.name)}"？\n\n` +
        `关联的收支记录将被同步删除：\n${txnDetails || '无关联收支'}`;

      if (!confirm(msg)) return;

      // 删除关联交易
      ['pocket', 'invest'].forEach(accId => {
        carAppData.accounts[accId].transactions =
          carAppData.accounts[accId].transactions.filter(t => t.carSid !== sid);
      });
      // 删除小车
      carAppData.cars = carAppData.cars.filter(c => c.sid !== sid);
      addOperationLog('car_delete', `删除小车 ${esc(car.brand)} ${esc(car.name)}${linkedTxns.length > 0 ? '（含' + linkedTxns.length + '条收支）' : ''}`, { name: car.name, brand: car.brand, txnCount: linkedTxns.length });

      const sid = document.getElementById('editCarSid').value;

      if (!car) return;

      const oldExpected = car.expectedValue;
      car.brand = document.getElementById('editCarBrand').value.trim();

      if (editCarName) car.name = editCarName;

      if (newExpected !== oldExpected) {
        appendExpectedHistory(car, newExpected, getToday());

        const newBuyDate = document.getElementById('editCarBuyDate').value;

          ...carAppData.accounts.invest.transactions
        ].filter(t => t.carSid === car.sid && t.category === 'car_buy');

          if (newBuyPrice > 0) t.amount = newBuyPrice;
          if (newBuyDate) t.date = newBuyDate;

      hideModal();

    function convertCar(sid) {
      const car = carAppData.cars.find(c => c.sid === sid);
      if (!car) return;

      const oldCategory = car.category;
      const newCategory = oldCategory === 'invest' ? 'keep' : 'invest';
      const oldLabel = oldCategory === 'invest' ? '投资' : '自留';
      const newLabel = newCategory === 'invest' ? '投资' : '自留';

      if (!confirm(`确定将 "${car.name}" 从${oldLabel}库移至${newLabel}库？\n\n买入价 ${fmt(car.buyPrice)} — 关联收支将同步转移。`)) return;

      car.category = newCategory;

      const fromAccId = oldCategory === 'invest' ? 'invest' : 'pocket';
      const toAccId = newCategory === 'invest' ? 'invest' : 'pocket';

      // 转移关联的买车/卖车交易
      const fromAcc = carAppData.accounts[fromAccId];
      const toAcc = carAppData.accounts[toAccId];
      const linkedTxns = fromAcc.transactions.filter(t => t.carSid === sid);
      linkedTxns.forEach(t => toAcc.transactions.push(t));
      carAppData.accounts[fromAccId].transactions =
        fromAcc.transactions.filter(t => t.carSid !== sid);

      // 计算关联交易实际金额（买入 - 卖出）
      const buyTotal = linkedTxns.filter(t => t.category === 'car_buy').reduce((s, t) => s + t.amount, 0);
      const sellTotal = linkedTxns.filter(t => t.category === 'car_sell').reduce((s, t) => s + t.amount, 0);
      const transferAmount = buyTotal - sellTotal;

      // 生成转账配对记录
      const transferPairId = genId('tp');
      const date = getToday();

      carAppData.transferPairs.push({
        id: transferPairId,
        fromAccount: fromAccId,
        toAccount: toAccId,
        amount: transferAmount,
        date: date,
        note: `${oldLabel}→${newLabel}: ${car.name}`
      });

      addOperationLog('car_convert', esc(car.name) + ' ' + oldLabel + '→' + newLabel + ' 按 ' + fmt(transferAmount), { name: car.name, from: oldLabel, to: newLabel, amount: transferAmount });
      saveData();
    }

    // ==================== 小车库存 ====================
    let invSortMode = 'brand';
    let invSearchText = '';
    let invSubCatFilter = '';

    function onInvSubCatFilter() {
      invSubCatFilter = document.getElementById('invSubCatFilter')?.value || '';
      renderInventory();
    }

    function renderInventory() {
      const unsoldCars = carAppData.cars.filter(c => !c.isSold);

      let filtered = unsoldCars;
      if (invSearchText) {
        const q = invSearchText.toLowerCase();
        filtered = unsoldCars.filter(c =>
          c.name.toLowerCase().includes(q) ||
          c.brand.toLowerCase().includes(q) ||
          c.sid.toLowerCase().includes(q) ||
          (c.subCategory || '').toLowerCase().includes(q)
        );
      }
      if (invSubCatFilter) {
        filtered = filtered.filter(c => c.subCategory === invSubCatFilter);
      }

      let groups;
      if (invSortMode === 'brand') {
        groups = groupBy(filtered, c => (c.brand || '未知品牌') + '|' + c.name);
        // 对分组进行排序
        const sortedGroups = {};
        const hwGroups = [];
        const otherGroups = [];
        
        // 分离Hotwheels和其他品牌
        Object.entries(groups).forEach(([key, cars]) => {
          if (cars[0].brand === 'Hotwheels') {
            hwGroups.push([key, cars]);
          } else {
            otherGroups.push([key, cars]);
          }
        });
        
        // Hotwheels内部按子类别排序
        hwGroups.sort(([keyA, carsA], [keyB, carsB]) => {
          const subCatA = carsA[0].subCategory || '';
          const subCatB = carsB[0].subCategory || '';
          const indexA = HW_SUBCAT_ORDER.indexOf(subCatA);
          const indexB = HW_SUBCAT_ORDER.indexOf(subCatB);
          // 处理不在列表中的子类别，放到最后
          return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
        });
        
        // 其他品牌按ALL_BRANDS顺序排序
        otherGroups.sort(([keyA, carsA], [keyB, carsB]) => {
          const brandA = carsA[0].brand || '';
          const brandB = carsB[0].brand || '';
          const indexA = ALL_BRANDS.indexOf(brandA);
          const indexB = ALL_BRANDS.indexOf(brandB);
          // 处理不在列表中的品牌，放到最后
          return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
        });
        
        // 合并排序结果
        [...hwGroups, ...otherGroups].forEach(([key, cars]) => {
          sortedGroups[key] = cars;
        });
        groups = sortedGroups;
      } else {
        groups = groupBy(filtered, c => c.buyDate.slice(0, 7));
      }

      const investCount = unsoldCars.filter(c => c.category === 'invest').length;
      const keepCount = unsoldCars.filter(c => c.category === 'keep').length;

      const html = `
        <div class="max-w-6xl mx-auto space-y-4">

          <div class="glass rounded-2xl-apple p-3 flex flex-wrap gap-3 items-center">
            <div class="flex gap-1">
              <button onclick="setInvSort('brand')" class="px-3 py-1.5 rounded-lg text-xs font-medium ${invSortMode === 'brand' ? 'bg-blue-100 text-accent' : 'glass-light'} btn-glass">按品牌</button>
              <button onclick="setInvSort('month')" class="px-3 py-1.5 rounded-lg text-xs font-medium ${invSortMode === 'month' ? 'bg-blue-100 text-accent' : 'glass-light'} btn-glass">按月</button>
            </div>
            <input type="text" id="invSearch" placeholder="搜索品牌/名称/SID..." value="${esc(invSearchText)}"
                   oninput="onInvSearch()" class="flex-1 glass-input p-2 text-sm max-w-xs">
            <select id="invSubCatFilter" onchange="onInvSubCatFilter()" class="glass-input p-1.5 text-xs max-w-[100px]">
              <option value="">全部分类</option>
              ${HW_SUBCATS.filter(s => s).map(s => `<option value="${s}">${s}</option>`).join('')}
            </select>
            <div class="text-xs text-gray-500 ml-auto">
              总投资 ${investCount} + 自留 ${keepCount} = 共 ${unsoldCars.length} 辆
            </div>
          </div>

          <div class="space-y-4">
            ${Object.entries(groups).map(([key, cars]) => {
              cars.sort((a, b) => b.buyDate.localeCompare(a.buyDate));
              const label = invSortMode === 'brand'
                ? (cars[0].brand || '未知品牌') + ' ' + cars[0].name
                : key;
              const avgPrice = cars.reduce((s, c) => s + c.buyPrice, 0) / cars.length;
              const groupId = 'group_' + key.replace(/[^a-zA-Z0-9\\u4e00-\\u9fff]/g, '_');

              return `
                <div class="glass rounded-2xl-apple overflow-hidden">
                  <div class="glass-light p-4 flex justify-between items-center accordion-toggle" onclick="toggleAccordion('${groupId}')">
                    <div>
                      <span class="font-bold">${esc(label)}</span>
                      <span class="text-sm text-gray-500 ml-2">${cars.length} 辆 · 均价 ${fmt(avgPrice)}</span>
                      <span class="text-xs ml-2 ${cars[0].category === 'invest' ? 'text-invest' : 'text-keep'}">
                        ${cars[0].category === 'invest' ? '投资' : '自留'}
                      </span>
                    </div>

    function groupBy(arr, fn) {
      const map = {};
      arr.forEach(item => {
        const key = typeof fn === 'function' ? fn(item) : item[fn];
        if (!map[key]) map[key] = [];
        map[key].push(item);
      });
      return map;
    }

      body.classList.toggle('collapsed', !isCollapsed);

      icon.textContent = isCollapsed ? '▼' : '▶';

    // ==================== 预期价格更新器 ====================
    function openExpectedUpdater() {
      let unsoldCars = carAppData.cars.filter(c => !c.isSold);
      if (currentModule === 'daily') unsoldCars = unsoldCars.filter(c => c.category === 'keep');
      else if (currentModule === 'invest') unsoldCars = unsoldCars.filter(c => c.category === 'invest');

      if (unsoldCars.length === 0) {
        alert('当前版面无可更新小车');
        return;
      }

      // 按车型名称合并分组
      function groupCars(list) {
        const groups = {};
        list.forEach(c => {
          const key = c.name;
          if (!groups[key]) groups[key] = [];
          groups[key].push(c);
        });
        return Object.entries(groups).sort(([a], [b]) => a.localeCompare(b));
      }

      const investGroups = groupCars(unsoldCars.filter(c => c.category === 'invest'));
      const keepGroups = groupCars(unsoldCars.filter(c => c.category === 'keep'));

      const groupRow = ([name, items]) => {
        const first = items[0];
        const count = items.length;
        const avgExpected = items.reduce((s, c) => s + (c.expectedValue || c.buyPrice), 0) / count;
        const subCat = first.subCategory || '';
        return `
        <label class="flex items-center gap-3 px-4 py-2.5 hover:bg-white/30 text-sm cursor-pointer expected-group-row" data-subcategory="${esc(subCat)}">
          <input type="checkbox" value="${name}" class="expected-check rounded" checked>
          <span class="text-xs ${first.category === 'invest' ? 'text-invest' : 'text-keep'} font-semibold">${first.category === 'invest' ? '投资' : '自留'}</span>
          ${subCat ? `<span class="text-xs px-1 py-0.5 rounded ${subCat === '超宝' ? 'bg-green-100 text-green-700' : subCat === 'RLC' ? 'bg-yellow-100 text-yellow-700' : subCat === 'ELITE' ? 'bg-red-100 text-red-700' : subCat === '礼盒' ? 'bg-blue-100 text-blue-700' : subCat === '文化' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-600'}">${subCat}</span>` : ''}
          <span class="text-xs bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded-full font-medium mr-1">×${count}</span>
          <span class="font-medium truncate flex-1">${esc(first.brand || '?')} ${esc(name)}</span>
          <span class="text-xs text-gray-500">均价预期 ${fmt(avgExpected)}</span>
        </label>`;
      };

      const html = `
        <div id="expectedModal" class="fixed inset-0 modal-backdrop flex items-center justify-center p-4 z-50">
          <div class="glass-strong rounded-2xl-apple w-full max-w-lg max-h-[85vh] overflow-y-auto p-6">
            <div class="flex justify-between items-center mb-3">
              <h3 class="font-bold text-lg"><i data-lucide="diamond" class="w-4 h-4 inline-block align-middle mr-1 text-accent"></i> 预期价格更新</h3>
              <button onclick="closeExpectedSafe()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <p class="text-xs text-gray-400 mb-3">选择车型（合并显示），赋值为该车型<strong>所有</strong>小车统一设置预期价格</p>
            <div class="flex flex-wrap gap-1.5 mb-4">
              <button onclick="filterExpectedByTag('')" class="expected-tag-btn px-2.5 py-1 text-xs rounded-full glass-light hover:bg-white/60 active-tag">全部</button>
              ${HW_SUBCATS.filter(s => s).map(s => `<button onclick="filterExpectedByTag('${s}')" class="expected-tag-btn px-2.5 py-1 text-xs rounded-full glass-light hover:bg-white/60">${s}</button>`).join('')}
            </div>

            <div id="expectedStep1">
              ${investGroups.length > 0 ? `
                <div class="text-xs text-invest font-semibold mb-2 mt-2">投资库 (${unsoldCars.filter(c => c.category === 'invest').length} 辆)</div>
                <div class="divide-y divide-black/5 glass rounded-xl-apple overflow-hidden mb-3">
                  ${investGroups.map(groupRow).join('')}
                </div>` : ''}
              ${keepGroups.length > 0 ? `
                <div class="text-xs text-keep font-semibold mb-2 mt-2">自留库 (${unsoldCars.filter(c => c.category === 'keep').length} 辆)</div>
                <div class="divide-y divide-black/5 glass rounded-xl-apple overflow-hidden mb-3">
                  ${keepGroups.map(groupRow).join('')}
                </div>` : ''}
              <div class="flex justify-end gap-2 mt-4">
                <button onclick="hideModal()" class="px-4 py-2 glass-light rounded-xl-apple hover:bg-white/60 text-sm btn-glass">取消</button>
                <button onclick="startExpectedUpdate()" class="px-4 py-2 bg-accent/85 text-white rounded-xl-apple hover:bg-accent/90 text-sm btn-glass">开始更新</button>
              </div>
            </div>

            <div id="expectedStep2" class="hidden"></div>
          </div>
        </div>`;
      showModal(html);
      initIcons();

    function filterExpectedByTag(tag) {
      document.querySelectorAll('.expected-tag-btn').forEach(btn => {
        btn.classList.remove('active-tag');
        if (btn.textContent === tag || (tag === '' && btn.textContent === '全部')) {
          btn.classList.add('active-tag');
        }
      });
      document.querySelectorAll('.expected-group-row').forEach(row => {
        const rowTag = row.dataset.subcategory || '';
        if (tag === '' || rowTag === tag) {
          row.style.display = '';
          row.querySelector('.expected-check').checked = true;
        } else {
          row.style.display = 'none';
          row.querySelector('.expected-check').checked = false;
        }
      });
    }

    function startExpectedUpdate() {
      const checked = document.querySelectorAll('.expected-check:checked');
      if (checked.length === 0) { alert('请至少选择一辆小车'); return; }

      // 选中车型名称 → 展开为所有对应sid
      const names = Array.from(checked).map(cb => cb.value);
      let allCars = carAppData.cars.filter(c => !c.isSold);
      if (currentModule === 'daily') allCars = allCars.filter(c => c.category === 'keep');
      else if (currentModule === 'invest') allCars = allCars.filter(c => c.category === 'invest');

      const sids = [];
      names.forEach(name => {
        allCars.filter(c => c.name === name).forEach(c => sids.push(c.sid));
      });

      window._expectedSids = sids;
      window._expectedIdx = 0;
      window._expectedChanges = {};
      renderExpectedFill();
    }

    function renderExpectedFill() {
      const sids = window._expectedSids;
      const idx = window._expectedIdx;
      if (idx >= sids.length) {
        showExpectedSummary();
        return;
      }

      const car = carAppData.cars.find(c => c.sid === sids[idx]);
      if (!car) { window._expectedIdx++; renderExpectedFill(); return; }

      const html = `
        <div class="space-y-3">
          <div class="flex justify-between items-center">
            <div class="text-xs text-gray-400">${idx + 1} / ${sids.length}</div>
          </div>
          <div class="glass rounded-xl-apple p-4 text-center">
            <div class="text-sm font-semibold">${esc(car.brand || '?')} ${esc(car.name)}</div>
            <div class="text-xs text-gray-400 mt-1">当前预期: ${fmt(car.expectedValue || car.buyPrice)}</div>
            ${car.expectedHistory && car.expectedHistory.length > 1 ? `<div class="text-[10px] text-gray-400 mt-0.5">历史: ${car.expectedHistory.map(h => h.date + ' ' + fmt(h.value)).join(' → ')}</div>` : ''}
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1">新预期价格（同名称所有小车统一设置）</label>
            <input type="number" id="expectedNewVal" step="0.01" value="${car.expectedValue || car.buyPrice}" class="w-full glass-input p-2.5 text-sm" autofocus onkeydown="if(event.key==='Enter')confirmExpectedFill()">
          </div>
          <div class="flex justify-between gap-2">
            <button onclick="skipExpectedFill()" class="px-4 py-2 glass-light rounded-xl-apple hover:bg-white/60 text-sm btn-glass">跳过</button>
            <button onclick="confirmExpectedFill()" class="px-4 py-2 bg-accent/85 text-white rounded-xl-apple hover:bg-accent/90 text-sm btn-glass">下一步</button>
          </div>
          <div class="text-center mt-2">
            <button onclick="abortExpectedUpdate()" class="text-xs text-gray-400 hover:text-invest">退出更新</button>
          </div>
        </div>`;
      document.getElementById('expectedStep1').classList.add('hidden');
      document.getElementById('expectedStep2').classList.remove('hidden');
      document.getElementById('expectedStep2').innerHTML = html;
      initIcons();
    }

    function confirmExpectedFill() {
      const sids = window._expectedSids;
      const idx = window._expectedIdx;
      const car = carAppData.cars.find(c => c.sid === sids[idx]);
      const newVal = parseFloat(document.getElementById('expectedNewVal').value);
      if (!newVal || newVal <= 0) { alert('请输入有效价格'); return; }

      // 同名称所有未处理小车统一赋值并跳过
      const carName = car.name;
      window._expectedChanges[sids[idx]] = newVal;
      for (let i = sids.length - 1; i > idx; i--) {
        const c = carAppData.cars.find(x => x.sid === sids[i]);
        if (c && c.name === carName) {
          window._expectedChanges[sids[i]] = newVal;
          sids.splice(i, 1);
        }
      }
      window._expectedIdx++;
      renderExpectedFill();
    }

    function skipExpectedFill() {
      const sids = window._expectedSids;
      const idx = window._expectedIdx;
      const car = carAppData.cars.find(c => c.sid === sids[idx]);
      if (!car) { window._expectedIdx++; renderExpectedFill(); return; }
      // 同名称所有未处理小车全部跳过
      const carName = car.name;
      for (let i = sids.length - 1; i > idx; i--) {
        const c = carAppData.cars.find(x => x.sid === sids[i]);
        if (c && c.name === carName) sids.splice(i, 1);
      }
      window._expectedIdx++;
      renderExpectedFill();
    }

    function abortExpectedUpdate() {
      safeExitExpected();
    }

    function closeExpectedSafe() {
      const step2 = document.getElementById('expectedStep2');
      if (step2 && !step2.classList.contains('hidden')) {
        safeExitExpected();
      } else {
        hideModal();

    function safeExitExpected() {
      const changes = window._expectedChanges || {};
      const count = Object.keys(changes).length;
      if (count === 0) { hideModal(); return; }
      if (confirm('已填写 ' + count + ' 辆车的估值。\n\n确定 = 保存并退出\n取消 = 丢弃数据并退出')) {
        saveExpectedChanges();
      } else {
        if (confirm('确定丢弃已填写的 ' + count + ' 条估值并退出？')) {
          hideModal();
        }
      }
    }

    function showExpectedSummary() {
      const changes = window._expectedChanges;
      const sids = Object.keys(changes);
      if (sids.length === 0) { hideModal(); return; }

      const rows = sids.map(sid => {
        const car = carAppData.cars.find(c => c.sid === sid);
        const newVal = changes[sid];
        return `<div class="flex justify-between text-sm px-3 py-2">
          <span>${esc(car.brand || '?')} ${esc(car.name)}</span>
          <span class="text-gray-400">${fmt(car.expectedValue || car.buyPrice)} → <strong class="${newVal > (car.expectedValue || car.buyPrice) ? 'text-keep' : 'text-invest'}">${fmt(newVal)}</strong></span>
        </div>`;
      }).join('');

      const html = `
        <div class="space-y-3">
          <div class="text-sm font-semibold">确认更新 ${sids.length} 辆小车</div>
          <div class="divide-y divide-black/5 glass rounded-xl-apple overflow-hidden max-h-60 overflow-y-auto">
            ${rows}
          </div>
          <div class="flex justify-end gap-2">
            <button onclick="closeExpectedSafe()" class="px-4 py-2 glass-light rounded-xl-apple hover:bg-white/60 text-sm btn-glass">取消</button>
            <button onclick="saveExpectedChanges()" class="px-4 py-2 bg-accent/85 text-white rounded-xl-apple hover:bg-accent/90 text-sm btn-glass">确认保存</button>
          </div>
        </div>`;
      document.getElementById('expectedStep2').innerHTML = html;
    }

    function saveExpectedChanges() {
      const changes = window._expectedChanges;
      const date = getToday();
      Object.entries(changes).forEach(([sid, value]) => {
        const car = carAppData.cars.find(c => c.sid === sid);
        if (car) appendExpectedHistory(car, value, date);
      });
      addOperationLog('expected_update', '更新' + Object.keys(changes).length + '辆小车预期价格', { count: Object.keys(changes).length });
      hideModal();
      saveData();

    function openOldFormatImport() {
      const html = `

          <div class="glass-strong rounded-2xl-apple w-full max-w-2xl max-h-[90vh] flex flex-col">

    let _oldImportItems = [];

    function parseOldImport() {
      const raw = document.getElementById('oldImportText').value.trim();
      if (!raw) return alert('请粘贴数据');
      const lines = raw.split('\n').filter(l => l.trim());
      const items = [];
      let month = String(new Date().getMonth() + 1).padStart(2, '0');
      let year = String(new Date().getFullYear());

      lines.forEach((line, i) => {
        const parts = line.trim().split(/\s{2,}|\t+/);
        if (parts.length < 4) return;
        const day = parts[0].trim().padStart(2, '0');
        const type = parts[1].includes('支出') ? 'expense' : 'income';
        const catRaw = (parts[2] || '').replace(/[\[\]]/g, '');
        let category = 'other', isCarBuy = false, isCarSell = false;
        if (catRaw.includes('买小车')) { category = 'car_buy'; isCarBuy = true; }
        else if (catRaw.includes('卖小车')) { category = 'car_sell'; isCarSell = true; }
        else if (catRaw.includes('零花钱')) category = 'allowance';
        const name = (parts[3] || '').replace(/^卖/, '').replace(/ x\d+$/, '');
        const amountStr = (parts[parts.length - 1] || '').replace(/[+¥,]/g, '');
        const amount = Math.abs(parseFloat(amountStr)) || 0;
        items.push({ idx: i, day, date: year + '-' + month + '-' + day, type, category, isCarBuy, isCarSell, name, amount, origLine: line.trim() });
      });

      if (items.length === 0) return alert('未解析到有效数据');

      _oldImportItems = items;

      let expenseTotal = 0, incomeTotal = 0;
      items.forEach(it => { if (it.type === 'expense') expenseTotal += it.amount; else incomeTotal += it.amount; });

      const preview = items.map((it, i) => `
        <div class="flex items-center gap-2 py-1.5 border-b border-black/5 text-xs">
          <span class="w-6 text-gray-400">${i + 1}</span>
          <span class="w-10">${it.date}</span>
          <span class="w-8 ${it.type === 'expense' ? 'text-invest' : 'text-keep'} font-semibold">${it.type === 'expense' ? '出' : '入'}</span>
          <span class="w-14">${it.category}</span>
          <span class="flex-1 truncate">${esc(it.name)}</span>
          <span class="w-20 text-right font-mono ${it.type === 'expense' ? 'text-invest' : 'text-keep'}">${it.type === 'expense' ? '-' : '+'}${fmt(it.amount)}</span>
          <select id="oldAcc_${i}" class="glass-input text-xs p-1 rounded-lg" onchange="updateOldImportStats()">
            <option value="invest" ${it.category === 'car_sell' ? 'selected' : ''}>投资</option>
            <option value="pocket" ${it.category === 'allowance' ? 'selected' : ''}>零花</option>
          </select>
        </div>`).join('');

      document.getElementById('oldImportPreview').innerHTML = `
        <div class="font-semibold mb-2">解析 ${items.length} 条 · 支出 ${fmt(expenseTotal)} · 收入 ${fmt(incomeTotal)}</div>
        <div class="glass rounded-xl-apple overflow-hidden divide-y divide-black/5 mb-3">
          ${preview}
        </div>
        <div id="oldImportStats" class="text-gray-500 mb-2"></div>
        <button onclick="executeOldImport()" class="px-4 py-2 bg-accent/85 text-white rounded-xl-apple text-sm btn-glass">确认导入</button>
      `;
      setTimeout(updateOldImportStats, 100);
    }

    function updateOldImportStats() {
      let pCount = 0, iCount = 0, pSum = 0, iSum = 0;
      document.querySelectorAll('[id^="oldAcc_"]').forEach(sel => {
        const val = sel.value;
        const row = sel.closest('.flex');
        const amtText = row?.querySelector('.font-mono')?.textContent?.replace(/[+¥,]/g, '') || '0';
        const amt = Math.abs(parseFloat(amtText)) || 0;
        if (val === 'pocket') { pCount++; pSum += amt; }
        else { iCount++; iSum += amt; }
      });
      const el = document.getElementById('oldImportStats');
      if (el) el.innerHTML = '💰 零花钱 ' + pCount + '条 ' + fmt(pSum) + ' &emsp; 📈 投资 ' + iCount + '条 ' + fmt(iSum);
    }

    function executeOldImport() {
      const items = _oldImportItems;
      const year = String(new Date().getFullYear());
      const month = String(new Date().getMonth() + 1).padStart(2, '0');
      let carCount = 0, txnCount = 0;

      items.forEach((it, i) => {
        const sel = document.getElementById('oldAcc_' + i);
        const accountId = sel ? sel.value : (it.category === 'car_sell' ? 'invest' : 'invest');
        const account = carAppData.accounts[accountId];
        let carSid = null;

        if (it.isCarBuy) {
          carSid = genUUID();
          carAppData.cars.push({
            sid: carSid, brand: 'Hotwheels', name: it.name,
            buyDate: it.date, buyPrice: it.amount,
            expectedValue: it.amount, category: accountId === 'invest' ? 'invest' : 'keep',
            sellPrice: null, soldDate: null, isSold: false, note: '',
            expectedHistory: [{ date: it.date, value: it.amount }]
          });
          carCount++;
        }

        if (it.isCarSell) {
          const sellName = it.name;
          const existingCar = carAppData.cars.find(c =>
            c.name === sellName && !c.isSold && c.category === (accountId === 'invest' ? 'invest' : 'keep')
          );
          if (existingCar) {
            existingCar.isSold = true;
            existingCar.sellPrice = it.amount;
            existingCar.soldDate = it.date;
            carSid = existingCar.sid;
          }
        }

        account.transactions.push({
          id: genId('txn'), type: it.type, category: it.category,
          amount: it.amount, date: it.date,
          carSid, loanId: null, transferPairId: null, note: it.name
        });
        txnCount++;
      });

      hideModal();
      addOperationLog('import', '导入旧格式 ' + txnCount + '笔·' + carCount + '辆车', { txnCount, carCount });
      saveData();
      alert('✅ 导入完成！' + txnCount + '条收支 · ' + carCount + '辆车');
    }

    function renderCurrentModule() {
      switch (currentModule) {
        case 'dashboard': if (typeof renderDashboard === 'function') renderDashboard(); break;
        case 'daily': if (typeof renderDaily === 'function') renderDaily(); break;
        case 'invest': if (typeof renderInvest === 'function') renderInvest(); break;
        case 'inventory': if (typeof renderInventory === 'function') renderInventory(); break;
      }
      initIcons();
    }

    // ==================== 弹窗容器 ====================
    function showModal(html) {
      document.getElementById('modalContainer').innerHTML = html;
      initIcons();
    }

    function hideModal() {
      document.getElementById('modalContainer').innerHTML = '';
    }

    // ==================== Lucide图标初始化 ====================
    function initIcons() {
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
    }

    function closeModal(id) {
      const el = document.getElementById(id);
      if (el) el.classList.add('hidden');
    }

        { id: genId('txn'), type: 'expense', category: 'other', amount: 35, date: '2026-06-05', carSid: null, loanId: null, transferPairId: null, note: '午餐外卖' },
        { id: genId('txn'), type: 'expense', category: 'other', amount: 18.5, date: '2026-06-10', carSid: null, loanId: null, transferPairId: null, note: '奶茶' }

      const demoCar2 = {

      pocket.transactions.push({

        type: 'expense', category: 'car_buy', amount: 69, date: '2026-06-15',

      });
      invest.transactions.push({

    // ==================== 初始化 ====================
    window.onload = () => {
      loadData();

      // 如果无数据，注入默认示例数据
      if (carAppData.cars.length === 0 &&
          carAppData.accounts.pocket.transactions.length === 0 &&
          carAppData.accounts.invest.transactions.length === 0) {
        seedDemoData();
      }

      // 动态更新版本号显示
      const version = carAppData.version || '2.0.0';
      document.getElementById('appVersion').textContent = `v${version}`;
      document.title = `记账管理系统 v${version}`;
      updateCloudStatusUI();
      renderCurrentModule();
    };
    </script>
